<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - Care Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src='https://meet.jit.si/external_api.js'></script>
</head>

<body class="dashboard-page">
    <nav class="navbar glass-effect">
        <div class="logo">Care Connect <span style="font-size: 0.9rem; font-weight: 400; color: #fff;">| Doctor Portal</span></div>
        <div class="menu-toggle" id="mobile-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links" id="nav-links">
            <a href="index.html" style="margin-right: 20px; color: #fff;">Home</a>
            <a href="medicines.html" style="margin-right: 20px; color: #fff;">Medicine</a>
            <span id="welcomeMsg" style="color: var(--primary-light); margin-right: 15px;"></span>
            <button class="btn btn-outline" onclick="logout()">Logout</button>
        </div>
    </nav>
    <main class="dashboard-grid">
        <!-- Manage Appointments -->
        <div class="card glass-effect" style="grid-column: span 2;">
            <h3><span style="font-size: 1.5rem;">🩺</span> Scheduled Appointments</h3>
            <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 1rem;">View and manage your patient appointments.
            </p>

            <div id="doctorAppointments" class="mt-3" style="max-height: 400px; overflow-y: auto;">
                <p>Loading appointments...</p>
            </div>
        </div>
    </main>

    <!-- Call Modal -->
    <div id="callModal" class="modal"
        style="display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background-color: #000; align-items: center; justify-content: center;">
        <div style="position: absolute; top: 20px; right: 30px; z-index: 5001; display: flex; gap: 15px;">
            <button class="btn btn-danger" onclick="endCall()" style="border-radius: 50px; padding: 10px 25px; font-weight: bold;">End Call</button>
        </div>
        
        <!-- Calling Overlay -->
        <div id="callingOverlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1e293b, #0f172a); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5002;">
            <div style="width: 120px; height: 120px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; margin-bottom: 2rem; box-shadow: 0 0 30px rgba(37, 99, 235, 0.5); animation: pulse 2s infinite;">
                <span style="font-size: 3rem;">🩺</span>
            </div>
            <h2 id="callingText" style="color: #fff; margin-bottom: 0.5rem;">Connecting to Patient...</h2>
            <p style="color: #60a5fa; font-size: 1.1rem;">Secure Video Channel</p>
        </div>

        <div id="jitsi-container" style="width: 100%; height: 100%;"></div>
    </div>

    <style>
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(37, 99, 235, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
    </style>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('token') || localStorage.getItem('role') !== 'DOCTOR') {
                window.location.href = 'login.html';
            }
            document.getElementById('welcomeMsg').textContent = `Dr. ${localStorage.getItem('userName')}`;
            loadDoctorAppointments();
        });

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        async function loadDoctorAppointments() {
            try {
                const res = await fetchWithAuth('/appointments/my');
                if (res.ok) {
                    const data = await res.json();
                    const list = document.getElementById('doctorAppointments');
                    list.innerHTML = '';
                    if (data.length === 0) { list.innerHTML = '<p style="color:#aaa;">No appointments scheduled yet.</p>'; return; }

                    data.forEach(app => {
                        const bg = app.type === 'EMERGENCY' ? 'rgba(239, 68, 68, 0.1)' : 'rgba(255,255,255,0.05)';
                        const strip = app.type === 'EMERGENCY' ? 'var(--danger)' : 'var(--primary)';

                        let detailsHtml = '';
                        if (app.type === 'EMERGENCY') {
                            detailsHtml = `
                                <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; margin-top: 10px; border: 1px solid rgba(239,68,68,0.2);">
                                    <div style="color: var(--danger); font-weight: bold; margin-bottom: 5px;">🚨 Emergency Patient Info</div>
                                    <strong>Patient Name:</strong> ${app.patientName} <br/>
                                    <strong>Medical Info:</strong> ${app.patientDetails} <br/>
                                    <strong>Emergency Note:</strong> ${app.diseaseDescription} <br/>
                                    ${app.attachmentUrl ? `<a href="${API_BASE_URL.replace('/api', '')}${app.attachmentUrl}" target="_blank" style="color: var(--primary-light); display: inline-block; margin-top: 5px;">📎 View Photo/Video</a>` : ''}
                                </div>
                            `;
                        }

                        list.innerHTML += `
                            <div style="background: ${bg}; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid ${strip}">
                                <div style="display: flex; justify-content: space-between;">
                                    <strong>Date:</strong> ${app.appointmentDate} ${app.appointmentTime || 'N/A'}
                                    <span style="color:${strip}; font-weight: bold;">${app.type}</span>
                                </div>
                                <strong>Status:</strong> ${app.status} <br/>
                                <strong>General Notes:</strong> ${app.notes || 'None provided.'} <br/>
                                ${detailsHtml}
                                <div style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;">
                                    ${app.status === 'PENDING' ? `<button class="btn btn-primary" style="background-color: #10b981; border-color: #10b981;" onclick="updateStatus(${app.id}, 'CONFIRMED')">Approve</button>` : ''}
                                    ${app.status === 'PENDING' ? `<button class="btn btn-danger" onclick="updateStatus(${app.id}, 'REJECTED')">Reject</button>` : ''}
                                    
                                    ${app.status === 'CONFIRMED' && app.meetingId ? `
                                        <button onclick="startCall('${app.meetingId}', true)" class="btn btn-primary" style="background: var(--primary); border-radius: 5px; font-size: 0.8rem;">📹 Video Call</button>
                                        <button onclick="startCall('${app.meetingId}', false)" class="btn btn-outline" style="border-radius: 5px; font-size: 0.8rem; border-color:var(--primary-light);">📞 Audio Call</button>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (e) { console.error(e); }
        }

        async function updateStatus(id, newStatus) {
            try {
                const res = await fetchWithAuth(`/appointments/${id}/status`, {
                    method: 'PUT', body: JSON.stringify({ status: newStatus })
                });
                if (res.ok) loadDoctorAppointments();
            } catch (e) { console.error(e); }
        }

        // Call Handling Logic
        let jitsiAPI = null;

        function startCall(meetingId, isVideo = true) {
            const modal = document.getElementById('callModal');
            const overlay = document.getElementById('callingOverlay');
            modal.style.display = 'flex';
            overlay.style.display = 'flex';

            const domain = 'meet.jit.si';
            const options = {
                roomName: `CareConnect-${meetingId}`,
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#jitsi-container'),
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: !isVideo,
                    prejoinPageEnabled: false
                }
            };

            // Remove existing if any
            if (jitsiAPI) jitsiAPI.dispose();
            
            jitsiAPI = new JitsiMeetExternalAPI(domain, options);

            // Hide overlay when someone joins or after timeout
            jitsiAPI.addEventListener('videoConferenceJoined', () => {
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 1000);
            });
        }

        function endCall() {
            if (jitsiAPI) {
                jitsiAPI.dispose();
                jitsiAPI = null;
            }
            document.getElementById('callModal').style.display = 'none';
            document.getElementById('jitsi-container').innerHTML = '';
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Care Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .phase-step {
            display: none;
        }
        .phase-step.active {
            display: block;
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>

<body class="auth-page">
    <nav class="navbar glass-effect">
        <div class="logo">Care Connect</div>
        <div class="nav-links" id="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html" class="btn btn-outline">Back to Login</a>
        </div>
    </nav>
    <main class="center-content pb-4">
        <div class="form-container glass-effect mt-5" style="max-width: 450px;">
            <h2 class="text-gradient">Reset Password</h2>
            
            <!-- Phase 1: Request OTP -->
            <div id="phase1" class="phase-step active mt-4">
                <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Enter your registered email or mobile number to receive a 6-digit verification code.</p>
                <form id="forgotForm">
                    <div class="form-group">
                        <label for="identifier">Email or Mobile</label>
                        <input type="text" id="identifier" required placeholder="john@example.com or 9876543210">
                    </div>
                    <button type="submit" id="requestBtn" class="btn btn-primary btn-block mt-4">Send Verification Code</button>
                    <div id="phase1Error" class="mt-2 text-center" style="display:none; color: var(--danger); font-size: 0.9rem;"></div>
                </form>
            </div>

            <!-- Phase 2: Verify OTP & Reset Password -->
            <div id="phase2" class="phase-step mt-4">
                <p style="color: var(--text-muted); margin-bottom: 1.5rem;">We've sent a code (check console logs). Enter it below with your new password.</p>
                <form id="resetForm">
                    <div class="form-group">
                        <label for="otp">6-Digit Code</label>
                        <input type="text" id="otp" required maxlength="6" placeholder="000000" style="letter-spacing: 5px; text-align: center; font-size: 1.2rem; font-weight: bold;">
                    </div>
                    <div class="form-group mt-3">
                        <label for="newPassword">New Password</label>
                        <div class="password-container">
                            <input type="password" id="newPassword" required placeholder="Minimum 6 characters" minlength="6">
                            <span class="password-toggle" onclick="togglePassword('newPassword', this)">👁️</span>
                        </div>
                    </div>
                    <div class="form-group mt-3">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" required placeholder="Re-enter new password">
                    </div>
                    <button type="submit" id="resetBtn" class="btn btn-primary btn-block mt-4">Reset Password</button>
                    <button type="button" onclick="goToPhase1()" class="btn btn-outline btn-block mt-2">Back</button>
                    <div id="phase2Error" class="mt-2 text-center" style="display:none; color: var(--danger); font-size: 0.9rem;"></div>
                </form>
            </div>
            
            <p class="text-center mt-4" style="font-size:0.9rem; color: var(--text-muted);">
                Remembered it? <a href="login.html" style="color: var(--primary-light);">Login instead</a>
            </p>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let currentIdentifier = "";

        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🔒';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }

        function goToPhase1() {
            document.getElementById('phase2').classList.remove('active');
            document.getElementById('phase1').classList.add('active');
        }

        function goToPhase2() {
            document.getElementById('phase1').classList.remove('active');
            document.getElementById('phase2').classList.add('active');
        }

        // Phase 1: Request OTP
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value.trim();
            const btn = document.getElementById('requestBtn');
            const errorDiv = document.getElementById('phase1Error');

            btn.disabled = true;
            btn.textContent = "Sending...";
            errorDiv.style.display = 'none';

            try {
                const response = await fetchWithAuth('/auth/forgot-password', {
                    method: 'POST',
                    body: JSON.stringify({ identifier })
                });

                if (response.ok) {
                    currentIdentifier = identifier;
                    Swal.fire({
                        title: 'Code Sent!',
                        text: 'A verification code has been generated. Since this is a demo, please check the BACKEND CONSOLE LOGS for the 6-digit code.',
                        icon: 'info',
                        confirmButtonText: 'I have the code'
                    }).then(() => {
                        goToPhase2();
                    });
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.message || "Failed to find user.";
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = "Server error. Please try again.";
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = "Send Verification Code";
            }
        });

        // Phase 2: Reset Password
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('otp').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');
            const errorDiv = document.getElementById('phase2Error');

            if (newPassword !== confirmPassword) {
                errorDiv.textContent = "Passwords do not match.";
                errorDiv.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = "Resetting...";
            errorDiv.style.display = 'none';

            try {
                const response = await fetchWithAuth('/auth/reset-password', {
                    method: 'POST',
                    body: JSON.stringify({ identifier: currentIdentifier, otp, newPassword })
                });

                if (response.ok) {
                    Swal.fire({
                        title: 'Success!',
                        text: 'Your password has been reset successfully.',
                        icon: 'success',
                        confirmButtonText: 'Go to Login'
                    }).then(() => {
                        window.location.href = 'login.html';
                    });
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.message || "Reset failed. Invalid code?";
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = "Server error. Please try again.";
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = "Reset Password";
            }
        });
    </script>
</body>

</html>

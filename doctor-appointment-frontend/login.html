<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Doctor Appointment System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            transition: 0.3s;
        }
        .auth-tab.active {
            color: var(--primary-light);
            border-bottom: 2px solid var(--primary-light);
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>

<body>
    <nav class="navbar glass-effect">
        <div class="logo">Care Connect</div>
        <div class="menu-toggle" id="mobile-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links" id="nav-links">
            <a href="index.html">Home</a>
            <a href="doctors.html">Doctors</a>
            <a href="index.html#services">Services</a>
            <a href="login.html" class="btn btn-primary active">Login</a>
            <a href="register.html" class="btn btn-outline">Register</a>
        </div>
    </nav>
    <main class="center-content">
        <div class="form-container glass-effect">
            <h2 class="text-gradient">Welcome Back</h2>
            <p>Please login to your account.</p>

            <div class="mt-4"></div> <!-- Spacer -->

            <form id="emailForm" class="auth-form active">
                <div class="form-group">
                    <label for="identifier">Email or Mobile Number</label>
                    <input type="text" id="identifier" required placeholder="john@example.com or 9876543210">
                </div>
                <div class="form-group mt-3">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <div id="emailError" class="error-text mt-2" style="display:none; color: var(--danger); font-size: 0.85rem;"></div>
                <button type="submit" class="btn btn-primary btn-block mt-4" id="loginBtn">Secure Login</button>
            </form>



            <p class="mt-4 text-center">Don't have an account? <a href="register.html"
                    style="color: var(--primary-light);">Register</a></p>
            <p class="mt-2 text-center" style="font-size: 0.85rem;">Are you a medical professional? <a
                    href="doctor-register.html" style="color: var(--primary-light); text-decoration: underline;">Apply
                    Here</a></p>
        </div>
    </main>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('token')) {
                const role = localStorage.getItem('role');
                if (role === 'ADMIN') window.location.href = 'admin-dashboard.html';
                else if (role === 'DOCTOR') window.location.href = 'doctor-dashboard.html';
                else window.location.href = 'patient-dashboard.html';
            }
        });





        async function handleLoginSuccess(response) {
            const data = await response.json();
            console.log("Login success data:", data);
            
            // Standardize role - remove ROLE_ if present
            const cleanRole = data.role ? data.role.replace('ROLE_', '') : 'PATIENT';
            
            localStorage.setItem('token', data.token);
            localStorage.setItem('role', cleanRole);
            localStorage.setItem('userId', data.id);
            localStorage.setItem('userName', data.name || data.username || "User");

            if (cleanRole === 'ADMIN') {
                window.location.href = 'admin-dashboard.html';
            } else if (cleanRole === 'DOCTOR') {
                window.location.href = 'doctor-dashboard.html';
            } else {
                window.location.href = 'patient-dashboard.html';
            }
        }

        // Standard Login Form Handler (Email or Mobile String)
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('emailError');
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.textContent = "Logging in...";
            errorDiv.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });

                if (response.ok) {
                    await handleLoginSuccess(response);
                } else {
                    const errData = await response.json();
                    errorDiv.textContent = errData.message || "Login failed. Please check credentials.";
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = "Server error. Please try again later.";
                errorDiv.style.display = 'block';
            }
        });


        // Mobile Menu Toggle
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');

        mobileMenu.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Close menu on link click
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });
    </script>
</body>

</html>

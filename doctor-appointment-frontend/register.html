<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Doctor Appointment System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar glass-effect">
        <div class="logo">Care Connect</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="doctors.html">Doctors</a>
            <a href="index.html#services">Services</a>
            <a href="login.html" class="btn btn-outline">Login</a>
            <a href="register.html" class="btn btn-primary active">Register</a>
        </div>
    </nav>
    <main class="center-content pb-4">
        <div class="form-container glass-effect mt-5" style="max-width: 500px;">
            <h2 class="text-gradient">Create Account</h2>
            <form id="registerForm" class="mt-4">
                <p class="text-muted mb-4" style="font-size: 0.9rem;">Please provide <b>at least one</b> contact method (Email or Mobile)</p>
                
                <div class="form-group">
                    <label for="name">Full Name (Required)</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group mt-3">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="john@example.com">
                </div>
                <div class="form-group mb-3">
                    <label for="mobileNumber">Mobile Number</label>
                    <input type="text" id="mobileNumber" class="form-control" placeholder="10-digit mobile number">
                </div>
                <!-- Password is generated by the server, hiding this field -->
                <div class="form-group mb-4" style="display: none;">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Password will be auto-generated" value="hidden_pwd">
                </div>
                <div class="form-group mt-3" style="display: none;">
                    <label for="role">Account Type</label>
                    <select id="role" required>
                        <option value="PATIENT" selected>Patient</option>
                    </select>
                </div>
                <div id="regMsg" class="mt-2 text-center" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block mt-4">Register</button>
            </form>
        </div>
    </main>
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('token')) {
                const role = localStorage.getItem('role');
                if (role === 'ADMIN') window.location.href = 'admin-dashboard.html';
                else if (role === 'DOCTOR') window.location.href = 'doctor-dashboard.html';
                else window.location.href = 'patient-dashboard.html';
            }
        });

        // Role is hardcoded to PATIENT in the hidden field

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value.trim();
            const mobileNumber = document.getElementById('mobileNumber').value.trim();
            const password = document.getElementById('password').value; // This will be "hidden_pwd"
            const role = 'PATIENT';
            const msgDiv = document.getElementById('regMsg');

            if (!email && !mobileNumber) {
                msgDiv.textContent = "Please provide either an Email address or a Mobile Number.";
                msgDiv.style.color = "var(--danger)";
                msgDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, mobileNumber, password, role })
                });

                const data = await response.json(); // Parse response data here

                if (response.ok) {
                    // Determine if a PIN was returned in the message
                    const dataMessage = data.message || '';
                    if(dataMessage.includes("PIN is:")) {
                        const pin = dataMessage.split("PIN is:")[1].trim();
                        Swal.fire({
                            title: 'Registration Successful!',
                            html: `<p>Your permanent Login PIN is:</p><h2 style="color:var(--primary-color);font-weight:bold;letter-spacing:5px;" class="mt-2 mb-4">${pin}</h2><p>Please write this down or save it. You will need it to login next time!</p>`,
                            icon: 'success',
                            confirmButtonText: 'Go to Login',
                            allowOutsideClick: false
                        }).then((result) => {
                            if (result.isConfirmed) {
                                window.location.href = 'login.html';
                            }
                        });
                    } else {
                        Swal.fire({
                            title: 'Success!',
                            text: 'Registration successful! Please login.',
                            icon: 'success'
                        }).then(() => {
                            window.location.href = 'login.html';
                        });
                    }
                } else {
                    const errData = data; // Use the already parsed data
                    msgDiv.textContent = errData.message || "Registration failed.";
                    msgDiv.style.color = "var(--danger)";
                    msgDiv.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                msgDiv.textContent = "Server error.";
                msgDiv.style.color = "var(--danger)";
                msgDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>

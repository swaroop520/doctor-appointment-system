<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Care Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar glass-effect">
        <div class="logo">Care Connect</div>
        <div class="menu-toggle" id="mobile-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links" id="nav-links">
            <a href="index.html">Home</a>
            <a href="doctors.html">Doctors</a>
            <a href="index.html#services">Services</a>
            <a href="login.html" class="btn btn-outline">Login</a>
            <a href="register.html" class="btn btn-primary active">Register</a>
        </div>
    </nav>
    <main class="center-content pb-4">
        <div class="form-container glass-effect mt-5" style="max-width: 500px;">
            <h2 class="text-gradient">Create Account</h2>
            <form id="registerForm" class="mt-4">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group mt-3">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group mt-3">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Create a strong password" minlength="6">
                </div>
                <div class="form-group mt-3">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required placeholder="Re-enter your password">
                </div>
                <div id="regMsg" class="mt-2 text-center" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block mt-4">Register</button>
                <p class="text-center mt-3" style="font-size:0.9rem; color: var(--text-muted);">
                    Already have an account? <a href="login.html" style="color: var(--primary-color);">Login here</a>
                </p>
            </form>
        </div>
    </main>
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('token')) {
                const role = localStorage.getItem('role');
                if (role === 'ADMIN') window.location.href = 'admin-dashboard.html';
                else if (role === 'DOCTOR') window.location.href = 'doctor-dashboard.html';
                else window.location.href = 'patient-dashboard.html';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = 'PATIENT';
            const msgDiv = document.getElementById('regMsg');

            if (password !== confirmPassword) {
                msgDiv.textContent = "Passwords do not match.";
                msgDiv.style.color = "var(--danger)";
                msgDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetchWithAuth('/auth/signup', {
                    method: 'POST',
                    body: JSON.stringify({ name, email, password, role })
                });

                const data = await response.json();

                if (response.ok) {
                    Swal.fire({
                        title: 'Registration Successful!',
                        text: 'Your account has been created. Please login.',
                        icon: 'success',
                        confirmButtonText: 'Go to Login'
                    }).then(() => {
                        window.location.href = 'login.html';
                    });
                } else {
                    msgDiv.textContent = data.message || "Registration failed. Please try again.";
                    msgDiv.style.color = "var(--danger)";
                    msgDiv.style.display = 'block';
                }
            } catch (err) {
                console.error("Register bug:", err);
                msgDiv.textContent = err.message || "Server error. Please try again later.";
                msgDiv.style.color = "var(--danger)";
                msgDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>

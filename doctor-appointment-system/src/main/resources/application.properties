# Server Port
server.port=${PORT:8080}

# Database Configuration (Fallback to H2 if DB_URL is missing)
spring.datasource.url=${DB_URL:jdbc:h2:mem:careconnectdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Hibernate Configuration
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
app.jwtSecret=${JWT_SECRET:CareConnectDefaultSecretKey_ChangeOnProduction}
app.jwtExpirationMs=86400000

# CORS Configuration
app.cors.allowedOrigins=*

# Active Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Google Gemini AI Configuration
# Get your API key from https://aistudio.google.com/
google.gemini.api.key=${GEMINI_API_KEY1:}

# Mail Configuration
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:placeholder@gmail.com}
spring.mail.password=${SMTP_PASSWORD:placeholder_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# Server Port
server.port=${PORT:8080}

# Database Configuration (Fallback to H2 if DB_URL is missing)
spring.datasource.url=${DB_URL:jdbc:h2:mem:careconnectdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Hibernate Configuration
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
app.jwtSecret=${JWT_SECRET:CareConnectDefaultSecretKey_ChangeOnProduction}
app.jwtExpirationMs=86400000

# CORS Configuration
app.cors.allowedOrigins=*

# Active Profile
spring.profiles.active=local

# Google Gemini AI Configuration
# Get your API key from https://aistudio.google.com/
google.gemini.api.key=${GEMINI_API_KEY1:}

# Email Configuration (SMTP)
# NOTE: Replace with your actual credentials for real delivery
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-google-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
